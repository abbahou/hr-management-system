server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: iam-service
          uri: lb://iam-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: iam-service-legacy
          uri: lb://iam-service
          predicates:
            - Path=/auth/**
          filters:
            - PrefixPath=/api

        - id: recruitment-service
          uri: lb://recruitment-service
          predicates:
            - Path=/recruitment/**
          filters:
            - StripPrefix=1

        - id: employee-service
          uri: lb://employee-service
          predicates:
            - Path=/employees/**
          filters:
            - StripPrefix=1

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true

