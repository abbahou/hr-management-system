server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin RETAIN_UNIQUE
        - DedupeResponseHeader=Access-Control-Allow-Credentials RETAIN_UNIQUE
      routes:
        - id: iam-service
          uri: lb://iam-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: iam-service-legacy
          uri: lb://iam-service
          predicates:
            - Path=/auth/**
          filters:
            - PrefixPath=/api

        - id: recruitment-service
          uri: lb://recruitment-service
          predicates:
            - Path=/recruitment/**
          filters:
            - StripPrefix=1

        - id: employee-service
          uri: lb://employee-service
          predicates:
            - Path=/employees/**
          filters:
            - StripPrefix=1

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true

