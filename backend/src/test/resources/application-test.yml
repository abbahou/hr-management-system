spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/iam_db}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://127.0.0.1:65535/mock-jwks

app:
  jwt:
    secret: this-is-a-very-long-dev-secret-key-change-in-prod-12345

