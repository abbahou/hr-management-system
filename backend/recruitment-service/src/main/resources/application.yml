server:
  port: 8082

spring:
  application:
    name: recruitment-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/recruitment_db
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/hr-realm

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true

